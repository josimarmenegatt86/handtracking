<!DOCTYPE html>
<!-- Raios elétricos entre as mãos e nas pontas dos dedos (base: smm.axtarget.xyz/test29.html) -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interação Neon · Raios | Josimar Menegatt</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; overflow: hidden; background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; height: 100vh;
    }
    .dev-header {
      background: linear-gradient(90deg, #fff 0%, #e8f4fc 50%, #fff 100%);
      padding: 12px 24px; border-bottom: 2px solid #00b8d4;
      display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 200;
    }
    .dev-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; flex-shrink: 0; }
    .dev-avatar-fallback {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff); color: #fff;
      font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center;
      border: 2px solid #00d4ff; flex-shrink: 0;
    }
    .dev-identity { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dev-name { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role { color: #007a94; font-size: 11px; line-height: 1.35; }
    .dev-back-link {
      color: #0054a6; font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 6px 12px; border: 1px solid #00b8d4; border-radius: 6px; flex-shrink: 0;
    }
    .dev-back-link:hover { background: rgba(0, 184, 212, 0.12); }
    .main-stage { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    #input_video { position: absolute; visibility: hidden; width: 1px; height: 1px; }
    #output_canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      z-index: 5; transform: scaleX(-1);
    }
    #loading-screen {
      position: absolute; inset: 0; background: #000; display: flex;
      align-items: center; justify-content: center; z-index: 100;
    }
    .loader {
      width: 50px; height: 50px; border: 3px solid #111;
      border-top: 3px solid #fff; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Interação Neon</span>
      <span class="dev-role">Raios entre os dedos e entre as duas mãos. Aproxime as pontas dos dedos para conectar; punhos fechados desconectam com explosão de partículas.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <div class="main-stage" id="main-stage">
    <div id="loading-screen"><div class="loader"></div></div>
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script>
    const stageEl = document.getElementById('main-stage');
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const loadingScreen = document.getElementById('loading-screen');

    let isConnected = false;
    let particles = [];

    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.size = Math.random() * 5 + 2;
        this.speedX = (Math.random() - 0.5) * 18;
        this.speedY = (Math.random() - 0.5) * 18;
        this.life = 1.0;
        this.decay = Math.random() * 0.04 + 0.02;
      }
      update() {
        this.x += this.speedX; this.y += this.speedY;
        this.life -= this.decay; this.size *= 0.96;
      }
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function createLineExplosion(x1, y1, x2, y2) {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const steps = Math.floor(dist / 15);
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const px = x1 + (x2 - x1) * t;
        const py = y1 + (y2 - y1) * t;
        for (let j = 0; j < 6; j++) particles.push(new Particle(px, py, '#00d4ff'));
      }
    }

    function setupCanvas() {
      canvasElement.width = stageEl.clientWidth;
      canvasElement.height = stageEl.clientHeight;
    }

    /**
     * Desenha um raio elétrico realista com desvios aleatórios entre dois pontos.
     * @param {number} intensity - amplitude máxima dos desvios laterais
     */
    function drawRealisticLightning(ctx, x1, y1, x2, y2, intensity) {
      const distance = Math.hypot(x2 - x1, y2 - y1);
      const segments = Math.max(5, Math.floor(distance / 10));
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      for (let i = 1; i < segments; i++) {
        const t = i / segments;
        let tx = x1 + (x2 - x1) * t + (Math.random() - 0.5) * intensity;
        let ty = y1 + (y2 - y1) * t + (Math.random() - 0.5) * intensity;
        ctx.lineTo(tx, ty);
      }
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function getDist(p1, p2) {
      return Math.hypot(p1.x - p2.x, p1.y - p2.y);
    }

    /**
     * Detecta se a mão está fechada em punho.
     * Compara a posição Y das pontas dos dedos com as articulações intermediárias.
     * @returns {boolean} true se 3 ou mais dedos estiverem dobrados
     */
    function isFist(hand) {
      const tips = [8, 12, 16, 20];
      const joints = [6, 10, 14, 18];
      let folded = 0;
      for (let i = 0; i < tips.length; i++) {
        if (hand[tips[i]].y > hand[joints[i]].y) folded++;
      }
      return folded >= 3;
    }

    function renderHandElectricity(landmarks) {
      const w = canvasElement.width;
      const h = canvasElement.height;
      const tips = [4, 8, 12, 16, 20];
      const tipPoints = tips.map((idx) => ({ x: landmarks[idx].x * w, y: landmarks[idx].y * h }));
      canvasCtx.save();
      for (let i = 0; i < tipPoints.length - 1; i++) {
        canvasCtx.shadowBlur = 10;
        canvasCtx.shadowColor = '#00d4ff';
        canvasCtx.strokeStyle = 'white';
        canvasCtx.lineWidth = 1;
        drawRealisticLightning(canvasCtx, tipPoints[i].x, tipPoints[i].y, tipPoints[i + 1].x, tipPoints[i + 1].y, 10);
      }
      tipPoints.forEach((p) => {
        const rng = Math.random() * 8;
        canvasCtx.shadowBlur = 15 + rng;
        canvasCtx.shadowColor = '#00d4ff';
        canvasCtx.fillStyle = 'white';
        canvasCtx.beginPath();
        canvasCtx.arc(p.x, p.y, 6 + rng / 2, 0, Math.PI * 2);
        canvasCtx.fill();
      });
      canvasCtx.restore();
    }

    function onResults(results) {
      loadingScreen.style.display = 'none';
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      particles = particles.filter((p) => p.life > 0);
      particles.forEach((p) => { p.update(); p.draw(canvasCtx); });

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const handsLm = results.multiHandLandmarks;
        const w = canvasElement.width;
        const h = canvasElement.height;
        handsLm.forEach((hand) => renderHandElectricity(hand));

        if (handsLm.length === 2) {
          const hand1 = handsLm[0];
          const hand2 = handsLm[1];
          const tipsIndices = [4, 8, 12, 16, 20];
          const fist1 = isFist(hand1);
          const fist2 = isFist(hand2);

          if (isConnected && fist1 && fist2) {
            isConnected = false;
            tipsIndices.forEach((idx) => {
              createLineExplosion(hand1[idx].x * w, hand1[idx].y * h, hand2[idx].x * w, hand2[idx].y * h);
            });
          }

          if (!isConnected && !fist1 && !fist2) {
            for (const i of tipsIndices) {
              for (const j of tipsIndices) {
                if (getDist(hand1[i], hand2[j]) < 0.08) {
                  isConnected = true;
                  break;
                }
              }
              if (isConnected) break;
            }
          }

          if (isConnected) {
            tipsIndices.forEach((idx) => {
              const p1 = { x: hand1[idx].x * w, y: hand1[idx].y * h };
              const p2 = { x: hand2[idx].x * w, y: hand2[idx].y * h };
              canvasCtx.save();
              canvasCtx.shadowBlur = 25;
              canvasCtx.shadowColor = '#00bfff';
              canvasCtx.strokeStyle = 'rgba(180, 240, 255, 0.8)';
              canvasCtx.lineWidth = 3;
              drawRealisticLightning(canvasCtx, p1.x, p1.y, p2.x, p2.y, 25);
              canvasCtx.shadowBlur = 10;
              canvasCtx.shadowColor = 'white';
              canvasCtx.strokeStyle = 'white';
              canvasCtx.lineWidth = 1.5;
              drawRealisticLightning(canvasCtx, p1.x, p1.y, p2.x, p2.y, 15);
              canvasCtx.restore();
            });
          }
        } else {
          isConnected = false;
        }
      } else {
        isConnected = false;
      }
      canvasCtx.restore();
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 2, modelComplexity: 1,
      minDetectionConfidence: 0.7, minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    const cam = new Camera(videoElement, {
      onFrame: async () => { await hands.send({ image: videoElement }); },
      width: 1280, height: 720
    });

    setupCanvas();
    window.addEventListener('resize', setupCanvas);
    cam.start();
  </script>
</body>
</html>
