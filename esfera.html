<!DOCTYPE html>
<!-- Esfera de partículas 3D: pinça estica, punho explode, mão move (base: smm.axtarget.xyz/test9.html) -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esfera de Partículas 3D | Josimar Menegatt</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .dev-header {
      background: linear-gradient(90deg, #ffffff 0%, #e8f4fc 50%, #ffffff 100%);
      padding: 12px 24px;
      border-bottom: 2px solid #00b8d4;
      box-shadow: 0 2px 12px rgba(0, 80, 120, 0.08);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      z-index: 200;
    }

    .dev-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #00d4ff;
      box-shadow: 0 0 12px rgba(0, 251, 255, 0.35);
      flex-shrink: 0;
    }

    .dev-avatar-fallback {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff);
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #00d4ff;
      flex-shrink: 0;
    }

    .dev-identity { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .dev-name { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role { color: #007a94; font-size: 11px; line-height: 1.35; }

    .dev-back-link {
      color: #0054a6;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      padding: 6px 12px;
      border: 1px solid #00b8d4;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .dev-back-link:hover { background: rgba(0, 184, 212, 0.12); }

    .main-stage {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: #000;
    }

    #three-container,
    #three-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #webcam {
      position: absolute;
      visibility: hidden;
      width: 1px;
      height: 1px;
    }
  </style>
</head>
<body>

  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Esfera de Partículas</span>
      <span class="dev-role">Mão direita: pinça estica a esfera · punho explode. Mão esquerda: move o conjunto no espaço.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <div class="main-stage" id="main-stage">
    <video id="webcam" autoplay playsinline></video>
    <div id="three-container"></div>
  </div>

  <script>
    const stageEl = document.getElementById('main-stage');
    const threeContainer = document.getElementById('three-container');

    let scene, camera, renderer, points;
    const handLines = [];
    const particleCount = 28000;

    const initialPos = new Float32Array(particleCount * 3);
    const explosionVelocities = new Float32Array(particleCount * 3);

    let isDisintegrated = false;
    let isPinching = false;
    const handPos3D = new THREE.Vector3();
    const pinchPoint = new THREE.Vector3();

    const videoElement = document.getElementById('webcam');

    function resizeStage() {
      const w = stageEl.clientWidth;
      const h = stageEl.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }

    /** Inicializa cena Three.js, câmera, renderer e cria a esfera de partículas */
    function init() {
      scene = new THREE.Scene();
      const w = stageEl.clientWidth;
      const h = stageEl.clientHeight;
      camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
      camera.position.z = 8; // Distância inicial da câmera

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(w, h);
      renderer.setPixelRatio(window.devicePixelRatio);
      threeContainer.appendChild(renderer.domElement);

      const geo = new THREE.BufferGeometry();
      const posArray = new Float32Array(particleCount * 3);

      for (let i = 0; i < particleCount; i++) {
        const phi = Math.acos(-1 + (2 * i) / particleCount);
        const theta = Math.sqrt(particleCount * Math.PI) * phi;
        const r = 2.8;

        initialPos[i * 3] = r * Math.cos(theta) * Math.sin(phi);
        initialPos[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
        initialPos[i * 3 + 2] = r * Math.cos(phi);

        posArray[i * 3] = initialPos[i * 3];
        posArray[i * 3 + 1] = initialPos[i * 3 + 1];
        posArray[i * 3 + 2] = initialPos[i * 3 + 2];
      }

      geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      const mat = new THREE.PointsMaterial({
        color: 0x00f2ff,
        size: 0.02,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
      });

      points = new THREE.Points(geo, mat);
      scene.add(points);

      const lineMat = new THREE.LineBasicMaterial({ color: 0x00fbff, transparent: true, opacity: 0.6 });
      for (let i = 0; i < 42; i++) {
        const l = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
          lineMat
        );
        scene.add(l);
        handLines.push(l);
      }
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.8,
      minTrackingConfidence: 0.8
    });

    hands.onResults(onResults);

    function onResults(results) {
      handLines.forEach((l) => { l.visible = false; });

      if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((landmarks, index) => {
          const label = results.multiHandedness[index].label;
          drawSkeletalHand(landmarks, index * 21);

          const correctedX = (0.5 - landmarks[8].x) * 16;
          const correctedY = (0.5 - landmarks[8].y) * 12;

          if (label === 'Right') {
            const dThumbIndex = getDist(landmarks[4], landmarks[8]);
            handPos3D.set(correctedX, correctedY, 0);

            if (dThumbIndex < 0.05) {
              if (!isPinching) {
                pinchPoint.set(
                  correctedX - points.position.x,
                  correctedY - points.position.y,
                  0
                );
              }
              isPinching = true;
            } else {
              isPinching = false;
            }

            const isFist =
              landmarks[8].y > landmarks[6].y &&
              landmarks[12].y > landmarks[10].y &&
              landmarks[16].y > landmarks[14].y;

            if (isFist && !isDisintegrated) {
              for (let i = 0; i < particleCount; i++) {
                const speed = 0.6 + Math.random() * 0.8;
                explosionVelocities[i * 3] = (Math.random() - 0.5) * speed;
                explosionVelocities[i * 3 + 1] = (Math.random() - 0.5) * speed;
                explosionVelocities[i * 3 + 2] = (Math.random() - 0.5) * speed;
              }
            }
            isDisintegrated = isFist;
          } else if (label === 'Left') {
            points.position.x += (correctedX - points.position.x) * 0.1;
            points.position.y += (correctedY - points.position.y) * 0.1;
          }
        });
      }

      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        isPinching = false;
        isDisintegrated = false;
      }
    }

    function drawSkeletalHand(landmarks, offset) {
      const paths = [
        [0, 1, 2, 3, 4], [0, 5, 6, 7, 8], [5, 9, 13, 17],
        [0, 17, 18, 19, 20], [9, 10, 11, 12], [13, 14, 15, 16]
      ];
      let idx = offset;
      paths.forEach((p) => {
        for (let i = 0; i < p.length - 1; i++) {
          const l = handLines[idx++];
          if (!l) return;
          const v1 = new THREE.Vector3(
            (0.5 - landmarks[p[i]].x) * 16,
            (0.5 - landmarks[p[i]].y) * 12,
            -landmarks[p[i]].z * 15
          );
          const v2 = new THREE.Vector3(
            (0.5 - landmarks[p[i + 1]].x) * 16,
            (0.5 - landmarks[p[i + 1]].y) * 12,
            -landmarks[p[i + 1]].z * 15
          );
          l.geometry.setFromPoints([v1, v2]);
          l.visible = true;
        }
      });
    }

    /** Calcula distância 2D entre dois landmarks normalizados */
    function getDist(p1, p2) {
      return Math.hypot(p1.x - p2.x, p1.y - p2.y);
    }

    function animate() {
      requestAnimationFrame(animate);
      const pos = points.geometry.attributes.position.array;
      const worldX = points.position.x;
      const worldY = points.position.y;

      for (let i = 0; i < particleCount; i++) {
        const ix = i * 3;
        const iy = i * 3 + 1;
        const iz = i * 3 + 2;

        if (isDisintegrated) {
          pos[ix] += explosionVelocities[ix];
          pos[iy] += explosionVelocities[iy];
          pos[iz] += explosionVelocities[iz];
          explosionVelocities[ix] *= 0.98;
          explosionVelocities[iy] *= 0.98;
          explosionVelocities[iz] *= 0.98;
        } else if (isPinching) {
          const localHandX = handPos3D.x - worldX;
          const localHandY = handPos3D.y - worldY;
          const dx = initialPos[ix] - pinchPoint.x;
          const dy = initialPos[iy] - pinchPoint.y;
          const dz = initialPos[iz] - pinchPoint.z;
          const distToPinch = Math.sqrt(dx * dx + dy * dy + dz * dz);
          const stretchFactor = Math.exp(-distToPinch * 0.8);
          const offsetX = localHandX - pinchPoint.x;
          const offsetY = localHandY - pinchPoint.y;
          const targetX = initialPos[ix] + offsetX * stretchFactor;
          const targetY = initialPos[iy] + offsetY * stretchFactor;
          const targetZ = initialPos[iz];
          pos[ix] += (targetX - pos[ix]) * 0.15;
          pos[iy] += (targetY - pos[iy]) * 0.15;
          pos[iz] += (targetZ - pos[iz]) * 0.15;
        } else {
          pos[ix] += (initialPos[ix] - pos[ix]) * 0.1;
          pos[iy] += (initialPos[iy] - pos[iy]) * 0.1;
          pos[iz] += (initialPos[iz] - pos[iz]) * 0.1;
        }
      }

      points.geometry.attributes.position.needsUpdate = true;

      if (!isDisintegrated && !isPinching) {
        points.rotation.y += 0.005;
      }

      renderer.render(scene, camera);
    }

    const cameraInput = new Camera(videoElement, {
      onFrame: async () => { await hands.send({ image: videoElement }); },
      width: 1280,
      height: 720
    });

    init();
    resizeStage();
    window.addEventListener('resize', resizeStage);
    cameraInput.start();
    animate();
  </script>
</body>
</html>
