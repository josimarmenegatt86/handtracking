<!DOCTYPE html>
<!--
  senai-assinatura.html — Assinatura de Partículas SENAI
  Partículas formam o texto "SENAI" ao detectar a mão.
  Punho fecha = explosão. Mão aberta = reagrupamento.
  Mundo SENAI · Josimar Menegatt
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assinatura SENAI — Partículas | Josimar Menegatt</title>

  <!-- Three.js: renderização 3D das partículas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
  <!-- MediaPipe: câmera e detecção de mãos -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0; overflow: hidden; background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; height: 100vh;
    }

    /* ── Cabeçalho padrão do projeto ── */
    .dev-header {
      background: linear-gradient(90deg, #ffffff 0%, #e8f4fc 50%, #ffffff 100%);
      padding: 12px 24px; border-bottom: 2px solid #00b8d4;
      box-shadow: 0 2px 12px rgba(0,80,120,0.08);
      display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 200;
    }
    .dev-avatar {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid #00d4ff; box-shadow: 0 0 12px rgba(0,251,255,0.35); flex-shrink: 0;
    }
    .dev-avatar-fallback {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff);
      color: #fff; font-weight: 800; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #00d4ff; flex-shrink: 0;
    }
    .dev-identity { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .dev-name  { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role  { color: #007a94; font-size: 11px; line-height: 1.35; }
    .dev-back-link {
      color: #0054a6; font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 6px 12px; border: 1px solid #00b8d4; border-radius: 6px; flex-shrink: 0;
      transition: background 0.15s;
    }
    .dev-back-link:hover { background: rgba(0,184,212,0.12); }

    /* ── Área principal ── */
    .main-stage {
      position: relative; flex: 1; min-height: 0; overflow: hidden; background: #000;
    }

    /* Canvas Three.js ocupa toda a área */
    #three-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }

    /* Canvas da câmera (fundo, atrás das partículas) */
    #cam-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      transform: scaleX(-1); /* espelho */
      opacity: 0.18;         /* sutil — só para dar contexto visual */
    }

    /* Vídeo oculto — alimenta o MediaPipe */
    #input_video { display: none; }

    /* Dica de gesto exibida na tela */
    #hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.45); font-size: 13px; font-family: monospace;
      letter-spacing: 2px; text-align: center; pointer-events: none; z-index: 10;
      transition: opacity 0.5s;
    }

    /* Indicador de estado (mão detectada / aguardando) */
    #status {
      position: absolute; top: 16px; right: 20px;
      font-size: 11px; font-family: monospace; letter-spacing: 2px;
      color: #00d4ff; opacity: 0.7; pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>

  <!-- ── Cabeçalho padrão ── -->
  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Assinatura SENAI</span>
      <span class="dev-role">Mostre a mão → partículas formam "SENAI". Punho fecha → explosão. Mão aberta → reagrupamento.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <!-- ── Área de jogo ── -->
  <div class="main-stage" id="main-stage">
    <canvas id="cam-canvas"></canvas>
    <canvas id="three-canvas"></canvas>
    <video id="input_video" playsinline></video>
    <div id="hint">MOSTRE A MÃO PARA A CÂMERA</div>
    <div id="status">AGUARDANDO...</div>
  </div>

  <script>
    // ── Referências DOM ──
    const stageEl    = document.getElementById('main-stage');
    const camCanvas  = document.getElementById('cam-canvas');
    const camCtx     = camCanvas.getContext('2d');
    const threeCanvas = document.getElementById('three-canvas');
    const videoEl    = document.getElementById('input_video');
    const hintEl     = document.getElementById('hint');
    const statusEl   = document.getElementById('status');

    // ── Configuração Three.js ──
    const scene    = new THREE.Scene();
    const camera3d = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
    camera3d.position.z = 28;

    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);

    // ── Sistema de partículas ──
    const PARTICLE_COUNT = 60000;
    const positions  = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 3); // velocidades individuais
    const targets    = new Float32Array(PARTICLE_COUNT * 3); // posições alvo
    const colors     = new Float32Array(PARTICLE_COUNT * 3);

    // Paleta de cores: azul SENAI (#003DA5) → ciano (#00d4ff) → branco
    const paleta = [
      new THREE.Color(0x003DA5),
      new THREE.Color(0x0054a6),
      new THREE.Color(0x00b8d4),
      new THREE.Color(0x00d4ff),
      new THREE.Color(0xffffff),
    ];

    // Inicializa partículas espalhadas aleatoriamente
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;
      positions[i3]     = (Math.random() - 0.5) * 120;
      positions[i3 + 1] = (Math.random() - 0.5) * 120;
      positions[i3 + 2] = (Math.random() - 0.5) * 120;
      targets[i3]     = positions[i3];
      targets[i3 + 1] = positions[i3 + 1];
      targets[i3 + 2] = positions[i3 + 2];
      const c = paleta[Math.floor(Math.random() * paleta.length)];
      colors[i3] = c.r; colors[i3 + 1] = c.g; colors[i3 + 2] = c.b;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({
      size: 0.08, vertexColors: true,
      transparent: true, opacity: 0.9,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // ── Canvas de texto oculto para amostrar pixels do "SENAI" ──
    const txtCanvas = document.createElement('canvas');
    const txtCtx    = txtCanvas.getContext('2d');
    txtCanvas.width  = 1200;
    txtCanvas.height = 300;

    // Textos que as partículas podem formar (ciclo automático)
    const TEXTOS = ['SENAI', 'MUNDO SENAI', 'INOVAÇÃO', 'TECNOLOGIA', 'SENAI'];
    let textoIdx = 0;

    /**
     * Amostra os pixels visíveis do texto no canvas oculto
     * e distribui as partículas nessas posições.
     */
    function buildTextTargets(texto) {
      txtCtx.clearRect(0, 0, txtCanvas.width, txtCanvas.height);
      txtCtx.fillStyle = '#ffffff';
      const fs = texto.length > 6 ? 160 : 220;
      txtCtx.font = `900 ${fs}px 'Segoe UI', Arial, sans-serif`;
      txtCtx.textAlign    = 'center';
      txtCtx.textBaseline = 'middle';
      txtCtx.fillText(texto, txtCanvas.width / 2, txtCanvas.height / 2);

      const data   = txtCtx.getImageData(0, 0, txtCanvas.width, txtCanvas.height).data;
      const pontos = [];
      const step   = 3; // amostragem: 1 ponto a cada 3px (desempenho)
      for (let y = 0; y < txtCanvas.height; y += step) {
        for (let x = 0; x < txtCanvas.width; x += step) {
          if (data[(y * txtCanvas.width + x) * 4 + 3] > 128) {
            pontos.push({
              x: (x - txtCanvas.width  / 2) * 0.022,
              y: -(y - txtCanvas.height / 2) * 0.022,
            });
          }
        }
      }

      // Distribui as partículas pelos pontos amostrados
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const p  = pontos[i % pontos.length];
        targets[i3]     = p.x + (Math.random() - 0.5) * 0.15;
        targets[i3 + 1] = p.y + (Math.random() - 0.5) * 0.15;
        targets[i3 + 2] = (Math.random() - 0.5) * 0.5;
      }
    }

    /** Explode todas as partículas em direções aleatórias. */
    function explode() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const speed = 0.8 + Math.random() * 1.2;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(Math.random() * 2 - 1);
        velocities[i3]     = speed * Math.sin(phi) * Math.cos(theta);
        velocities[i3 + 1] = speed * Math.sin(phi) * Math.sin(theta);
        velocities[i3 + 2] = speed * Math.cos(phi);
        // Alvo: posição aleatória distante
        targets[i3]     = (Math.random() - 0.5) * 80;
        targets[i3 + 1] = (Math.random() - 0.5) * 80;
        targets[i3 + 2] = (Math.random() - 0.5) * 80;
      }
    }

    // ── Estado da mão ──
    let handVisible  = false;
    let wasFist      = false;
    let handPos      = new THREE.Vector3(); // posição 3D da palma
    let autoTimer    = null;               // timer para ciclo automático de texto

    /**
     * Detecta punho: 3+ dedos dobrados comparando distância da ponta ao pulso.
     * @param {Array} lm - landmarks da mão
     * @returns {boolean}
     */
    function isFist(lm) {
      const tips = [8, 12, 16, 20], pips = [6, 10, 14, 18];
      let n = 0;
      for (let i = 0; i < 4; i++) if (lm[tips[i]].y > lm[pips[i]].y) n++;
      return n >= 3;
    }

    /**
     * Avança para o próximo texto do ciclo e reconstrói os alvos das partículas.
     * Chamado automaticamente a cada 8s ou ao fechar o punho.
     */
    function proximoTexto() {
      textoIdx = (textoIdx + 1) % TEXTOS.length;
      buildTextTargets(TEXTOS[textoIdx]);
    }

    // Inicia com o primeiro texto
    buildTextTargets(TEXTOS[0]);

    // Ciclo automático: troca o texto a cada 8 segundos se nenhuma mão estiver presente
    function iniciarCicloAuto() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => {
        if (!handVisible) proximoTexto();
      }, 8000);
    }
    iniciarCicloAuto();

    /**
     * Loop de animação Three.js — executado a cada frame via requestAnimationFrame.
     * Aplica lerp nas posições, amortece velocidades residuais e rotaciona o conjunto.
     */
    function animate() {
      requestAnimationFrame(animate);

      const posAttr = geo.attributes.position;
      const lerpSpeed = 0.06; // velocidade de convergência para o alvo

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        // Aplica velocidade residual (explosão) com amortecimento
        velocities[i3]     *= 0.92;
        velocities[i3 + 1] *= 0.92;
        velocities[i3 + 2] *= 0.92;

        // Lerp em direção ao alvo + velocidade residual
        posAttr.array[i3]     += (targets[i3]     - posAttr.array[i3])     * lerpSpeed + velocities[i3];
        posAttr.array[i3 + 1] += (targets[i3 + 1] - posAttr.array[i3 + 1]) * lerpSpeed + velocities[i3 + 1];
        posAttr.array[i3 + 2] += (targets[i3 + 2] - posAttr.array[i3 + 2]) * lerpSpeed + velocities[i3 + 2];
      }

      posAttr.needsUpdate = true;

      // Rotação suave contínua quando não há mão
      if (!handVisible) {
        points.rotation.y += 0.003;
      } else {
        // Inclina levemente em direção à posição da mão
        points.rotation.y += (handPos.x * 0.05 - points.rotation.y) * 0.05;
        points.rotation.x += (handPos.y * -0.03 - points.rotation.x) * 0.05;
      }

      renderer.render(scene, camera3d);
    }

    /**
     * Callback principal do MediaPipe — executado a cada frame da câmera.
     * Atualiza o canvas de fundo, detecta gestos e controla explosão/reagrupamento.
     */
    function onResults(results) {
      // Desenha o vídeo no canvas de fundo (espelhado via CSS)
      camCanvas.width  = stageEl.clientWidth;
      camCanvas.height = stageEl.clientHeight;
      camCtx.drawImage(results.image, 0, 0, camCanvas.width, camCanvas.height);

      handVisible = !!(results.multiHandLandmarks && results.multiHandLandmarks.length > 0);

      if (handVisible) {
        const lm   = results.multiHandLandmarks[0];
        const fist = isFist(lm);

        // Posição 3D da palma (landmark 9) para inclinar as partículas
        handPos.set(
          (0.5 - lm[9].x) * 20,
          (0.5 - lm[9].y) * 14,
          0
        );

        // Transição punho fechado → aberto: explode e depois reagrupa no próximo texto
        if (fist && !wasFist) {
          explode();
          setTimeout(() => {
            proximoTexto();
          }, 600);
        }

        wasFist = fist;
        statusEl.textContent = fist ? 'PUNHO — EXPLOSÃO' : 'MÃO DETECTADA ✓';
        statusEl.style.color = fist ? '#ff4444' : '#00d4ff';
        hintEl.style.opacity = '0';
      } else {
        wasFist = false;
        statusEl.textContent = 'AGUARDANDO...';
        statusEl.style.color = 'rgba(255,255,255,0.4)';
        hintEl.style.opacity = '1';
      }
    }

    // ── Inicialização MediaPipe ──
    const hands = new Hands({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({
      maxNumHands: 2, modelComplexity: 1,
      minDetectionConfidence: 0.7, minTrackingConfidence: 0.7,
    });
    hands.onResults(onResults);

    const cam = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 1280, height: 720,
    });

    /**
     * Redimensiona o renderer e atualiza o aspect ratio da câmera 3D
     * ao mudar o tamanho da janela.
     */
    function resize() {
      const w = stageEl.clientWidth, h = stageEl.clientHeight;
      camera3d.aspect = w / h;
      camera3d.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Inicia ──
    cam.start();
    animate();
  </script>
</body>
</html>
