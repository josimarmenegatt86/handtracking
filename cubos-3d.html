<!DOCTYPE html>
<!-- Grade de cubos 3D reage à mão (base: smm.axtarget.xyz/test41.html) -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade de Cubos 3D | Josimar Menegatt</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
    .dev-header { background: linear-gradient(90deg, #fff 0%, #e8f4fc 50%, #fff 100%); padding: 12px 24px; border-bottom: 2px solid #00b8d4; display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 300; }
    .dev-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; flex-shrink: 0; }
    .dev-avatar-fallback { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #0054a6, #00d4ff); color: #fff; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; border: 2px solid #00d4ff; flex-shrink: 0; }
    .dev-identity { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dev-name { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role { color: #007a94; font-size: 11px; line-height: 1.35; }
    .dev-back-link { color: #0054a6; font-size: 12px; font-weight: 600; text-decoration: none; padding: 6px 12px; border: 1px solid #00b8d4; border-radius: 6px; flex-shrink: 0; }
    .dev-back-link:hover { background: rgba(0, 184, 212, 0.12); }
    .main-stage { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    #input_video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
    #canvas_3d { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 3; background: rgba(0,0,0,0.5); padding: 16px 20px; border-radius: 10px; pointer-events: none; }
  </style>
</head>
<body>
  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt" onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Grade de Cubos 3D</span>
      <span class="dev-role">Aproxime a mão: cubos surgem em 3D. Punho fechado: todos brilham em azul neon.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>
  <div class="main-stage" id="main-stage">
    <div id="loading">Ativando câmera…</div>
    <video id="input_video" autoplay playsinline></video>
    <canvas id="canvas_3d"></canvas>
  </div>
  <script>
    const stageEl = document.getElementById('main-stage');
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('canvas_3d');
    const loadingDiv = document.getElementById('loading');
    const scene = new THREE.Scene();
    let camera, renderer;
    const cubes = [];
    let handX = -100, handY = -100, isFist = false;

    function initThree() {
      const w = stageEl.clientWidth, h = stageEl.clientHeight;
      camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ canvas: canvasElement, alpha: true, antialias: true });
      renderer.setSize(w, h);
      const dl = new THREE.DirectionalLight(0xffffff, 2);
      dl.position.set(5, 5, 10);
      scene.add(dl);
      scene.add(new THREE.AmbientLight(0x404040, 1));
      const geo = new THREE.BoxGeometry(0.85, 0.85, 0.85);
      for (let x = 0; x < 18; x++) {
        for (let y = 0; y < 12; y++) {
          const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.9, transparent: true, opacity: 0, emissive: 0x0044ff, emissiveIntensity: 0 });
          const cube = new THREE.Mesh(geo, mat);
          cube.position.set((x - 9) * 1.1, (y - 6) * 1.1, -6);
          cube.originalZ = cube.position.z;
          scene.add(cube); cubes.push(cube);
        }
      }
      camera.position.z = 5;
    }

    function resizeStage() {
      const w = stageEl.clientWidth, h = stageEl.clientHeight;
      camera.aspect = w / h; camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }

    function onResults(results) {
      loadingDiv.style.display = 'none';
      if (results.multiHandLandmarks?.length) {
        const lm = results.multiHandLandmarks[0];
        let total = 0;
        [8, 12, 16, 20].forEach((id) => { total += Math.hypot(lm[id].x - lm[0].x, lm[id].y - lm[0].y); });
        isFist = total < 0.6;
        handX = (1 - lm[8].x - 0.5) * 22;
        handY = (0.5 - lm[8].y) * 16;
      } else { handX = handY = -100; isFist = false; }
    }

    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    hands.onResults(onResults);
    new Camera(videoElement, { onFrame: async () => hands.send({ image: videoElement }), width: 1280, height: 720 }).start();

    function animate() {
      requestAnimationFrame(animate);
      cubes.forEach((cube) => {
        const dist = Math.hypot(cube.position.x - handX, cube.position.y - handY);
        if (isFist) {
          cube.material.opacity += (0.8 - cube.material.opacity) * 0.1;
          cube.material.emissiveIntensity = 2;
          cube.material.color.setHex(0x00aaff);
          const tz = dist < 3.5 ? cube.originalZ + (3.5 - dist) * 4 : cube.originalZ;
          cube.position.z += (tz - cube.position.z) * 0.1;
        } else {
          cube.material.emissiveIntensity = 0;
          cube.material.color.setHex(0xffffff);
          if (dist < 3) {
            cube.position.z += ((cube.originalZ + (3 - dist) * 4.5) - cube.position.z) * 0.15;
            cube.material.opacity += (Math.min(0.7, (3 - dist) * 1.2) - cube.material.opacity) * 0.1;
            cube.rotation.x += 0.05; cube.rotation.y += 0.05;
          } else {
            cube.position.z += (cube.originalZ - cube.position.z) * 0.1;
            cube.material.opacity += (0 - cube.material.opacity) * 0.1;
            cube.rotation.x *= 0.9; cube.rotation.y *= 0.9;
          }
        }
      });
      renderer.render(scene, camera);
    }

    initThree(); resizeStage(); window.addEventListener('resize', resizeStage); animate();
  </script>
</body>
</html>
