<!-- AxtarGet — Fusão Rápida (base: smm.axtarget.xyz/test8.html) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxtarGet — Fusão Rápida | Josimar Menegatt</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
    * { box-sizing: border-box; }
    .dev-header {
      background: linear-gradient(90deg, #fff 0%, #e8f4fc 50%, #fff 100%);
      padding: 12px 24px; border-bottom: 2px solid #00b8d4;
      display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 500;
    }
    .dev-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; flex-shrink: 0; }
    .dev-avatar-fallback {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff); color: #fff;
      font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center;
      border: 2px solid #00d4ff; flex-shrink: 0;
    }
    .dev-identity { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dev-name { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role { color: #007a94; font-size: 11px; line-height: 1.35; }
    .dev-back-link {
      color: #0054a6; font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 6px 12px; border: 1px solid #00b8d4; border-radius: 6px; flex-shrink: 0;
    }
    .dev-back-link:hover { background: rgba(0, 184, 212, 0.12); }
    html, body { display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
    .main-stage { position: relative; flex: 1; min-height: 0; overflow: hidden; }

        :root {
            --neon-blue: #00f2ff;
            --deep-space: #010103;
            --glow-gold: #ffdd00;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--deep-space);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
            pointer-events: none;
        }

        .input-group {
            display: flex;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .input-group:focus-within {
            border-color: var(--neon-blue);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.25);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 25px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            letter-spacing: 1px;
        }

        button {
            background: var(--neon-blue);
            color: black;
            border: none;
            padding: 0 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: white;
            box-shadow: 0 0 20px white;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: var(--neon-blue);
            letter-spacing: 5px;
            font-weight: bold;
        }

        #text-canvas {
            display: none;
        }
    </style>
</head>
<body>
  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">AxtarGet — Fusão Rápida</span>
      <span class="dev-role">Sistema de fusão rápida de elementos com gestos.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <div class="main-stage">


    <div id="loading-screen">SISTEMA INICIANDO...</div>

    <div class="ui-panel">
        <div class="input-group">
            <input type="text" id="text-input" placeholder="Digite seu texto..." maxlength="25" autocomplete="off">
            <button id="transform-btn">CONTINUAR</button>
        </div>
    </div>

    <canvas id="text-canvas"></canvas>
    <div id="canvas-container"></div>

    <script>
        const textInput = document.getElementById('text-input');
        const transformBtn = document.getElementById('transform-btn');
        const loadingScreen = document.getElementById('loading-screen');
        const textCanvas = document.getElementById('text-canvas');
        const tCtx = textCanvas.getContext('2d', { willReadFrequently: true });

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particleCount = 45000; 
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3); 
        const colors = new Float32Array(particleCount * 3);
        const geometry = new THREE.BufferGeometry();

        let isTextMode = false;
        let isInitialLoad = true; // İlk yüklənməni izləmək üçün
        let mouse = new THREE.Vector3(-1000, -1000, 0);

        const baseColor = new THREE.Color(0x00f2ff);
        const goldColor = new THREE.Color(0xffdd00);

        function createSphere() {
            isTextMode = false;
            const radius = 30;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                
                targetPositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                targetPositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                targetPositions[i3 + 2] = radius * Math.cos(phi);
            }
        }

        function textToPoints(text) {
            isTextMode = true;
            isInitialLoad = false; // Mətn daxil edildisə artıq ilk yüklənmə deyil
            const fontSize = 100;
            tCtx.font = `bold ${fontSize}px Arial`;
            
            const metrics = tCtx.measureText(text);
            const textWidth = Math.ceil(metrics.width) + 40;
            const textHeight = fontSize * 1.5;

            textCanvas.width = textWidth;
            textCanvas.height = textHeight;
            
            tCtx.fillStyle = 'white';
            tCtx.font = `bold ${fontSize}px Arial`;
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            tCtx.fillText(text, textCanvas.width / 2, textCanvas.height / 2);

            const imageData = tCtx.getImageData(0, 0, textCanvas.width, textCanvas.height);
            const pixels = imageData.data;
            const points = [];

            const maxWorldWidth = 140; 
            let scale = 0.6;
            if ((textWidth * scale) > maxWorldWidth) {
                scale = maxWorldWidth / textWidth;
            }

            for (let y = 0; y < textCanvas.height; y += 1) {
                for (let x = 0; x < textCanvas.width; x += 1) {
                    const alpha = pixels[(y * textCanvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        points.push({
                            x: (x - textCanvas.width / 2) * scale,
                            y: (textCanvas.height / 2 - y) * scale
                        });
                    }
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const p = points[i % points.length];
                const noise = 0.5; 
                targetPositions[i3] = p.x + (Math.random() - 0.5) * noise;
                targetPositions[i3 + 1] = p.y + (Math.random() - 0.5) * noise;
                targetPositions[i3 + 2] = (Math.random() - 0.5) * noise;
            }
        }

        // İlk mövqeləri daha uzağa (məsələn 1200 vahid) atırıq ki, gəlmələri vaxt aparsın
        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            positions[i3] = (Math.random() - 0.5) * 1200;
            positions[i3 + 1] = (Math.random() - 0.5) * 1200;
            positions[i3 + 2] = (Math.random() - 0.5) * 1200;
            
            colors[i3] = baseColor.r;
            colors[i3 + 1] = baseColor.g;
            colors[i3 + 2] = baseColor.b;
        }
        createSphere();

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const pointsObj = new THREE.Points(geometry, material);
        scene.add(pointsObj);

        camera.position.z = 100;

        window.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            
            const vector = new THREE.Vector3(x, y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            mouse = camera.position.clone().add(dir.multiplyScalar(distance));
        });

        function animate() {
            requestAnimationFrame(animate);

            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;
            
            const mouseInfluenceRadius = isTextMode ? 12 : 25;
            
            // İlk yüklənmə zamanı sürəti (lerpSpeed) azaldırıq (0.01), 
            // sonra tədricən normal sürətə (0.05) qayıdırıq.
            let currentLerpSpeed = isInitialLoad ? 0.015 : 0.05;
            const friction = isInitialLoad ? 0.95 : 0.85;   

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                let tx = targetPositions[i3];
                let ty = targetPositions[i3 + 1];
                let tz = targetPositions[i3 + 2];

                if (!isTextMode) {
                    const angle = pointsObj.rotation.y;
                    const cos = Math.cos(angle);
                    const sin = Math.sin(angle);
                    const rx = tx * cos + tz * sin;
                    const rz = -tx * sin + tz * cos;
                    tx = rx;
                    tz = rz;
                }

                const dx = posAttr.array[i3] - mouse.x;
                const dy = posAttr.array[i3 + 1] - mouse.y;
                const dz = posAttr.array[i3 + 2] - mouse.z;
                const distSq = dx*dx + dy*dy + dz*dz;
                const dist = Math.sqrt(distSq);

                if (dist < mouseInfluenceRadius) {
                    const force = (mouseInfluenceRadius - dist) / mouseInfluenceRadius;
                    velocities[i3] += (dx / dist) * force * 1.5;
                    velocities[i3 + 1] += (dy / dist) * force * 1.5;
                    velocities[i3 + 2] += (dz / dist) * force * 1.5;

                    colAttr.array[i3] += (goldColor.r - colAttr.array[i3]) * 0.2;
                    colAttr.array[i3+1] += (goldColor.g - colAttr.array[i3+1]) * 0.2;
                    colAttr.array[i3+2] += (goldColor.b - colAttr.array[i3+2]) * 0.2;
                } else {
                    colAttr.array[i3] += (baseColor.r - colAttr.array[i3]) * 0.05;
                    colAttr.array[i3+1] += (baseColor.g - colAttr.array[i3+1]) * 0.05;
                    colAttr.array[i3+2] += (baseColor.b - colAttr.array[i3+2]) * 0.05;
                }

                velocities[i3] *= friction;
                velocities[i3+1] *= friction;
                velocities[i3+2] *= friction;

                posAttr.array[i3] += velocities[i3];
                posAttr.array[i3+1] += velocities[i3+1];
                posAttr.array[i3+2] += velocities[i3+2];

                posAttr.array[i3] += (tx - posAttr.array[i3]) * currentLerpSpeed;
                posAttr.array[i3 + 1] += (ty - posAttr.array[i3 + 1]) * currentLerpSpeed;
                posAttr.array[i3 + 2] += (tz - posAttr.array[i3 + 2]) * currentLerpSpeed;
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            if (!isTextMode) {
                pointsObj.rotation.y += 0.003;
            } else {
                pointsObj.rotation.y *= 0.9;
            }

            renderer.render(scene, camera);
        }

        function handleTransform() {
            const val = textInput.value.trim();
            if (val === "") {
                createSphere();
            } else {
                textToPoints(val);
            }
        }

        transformBtn.addEventListener('click', handleTransform);
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleTransform();
        });

        window.onload = () => {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                // Animasiya başladıqdan bir neçə saniyə sonra normal sürətə keçid edə bilərik
                setTimeout(() => { isInitialLoad = false; }, 4000);
            }, 500);
            animate();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
  </div>
</body>
</html>
