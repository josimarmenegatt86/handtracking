<!DOCTYPE html>
<!-- Partículas 3D: coração de partículas que vira texto; mouse repele (base: smm.axtarget.xyz/test19.html) -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partículas 3D · Morph | Josimar Menegatt</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .dev-header {
      background: linear-gradient(90deg, #ffffff 0%, #e8f4fc 50%, #ffffff 100%);
      padding: 12px 24px;
      border-bottom: 2px solid #00b8d4;
      box-shadow: 0 2px 12px rgba(0, 80, 120, 0.08);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      z-index: 200;
    }

    .dev-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #00d4ff;
      box-shadow: 0 0 12px rgba(0, 251, 255, 0.35);
      flex-shrink: 0;
    }

    .dev-avatar-fallback {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff);
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #00d4ff;
      flex-shrink: 0;
    }

    .dev-identity {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .dev-name {
      color: #0d2137;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .dev-role {
      color: #007a94;
      font-size: 11px;
      letter-spacing: 0.2px;
      line-height: 1.35;
    }

    .dev-back-link {
      color: #0054a6;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      padding: 6px 12px;
      border: 1px solid #00b8d4;
      border-radius: 6px;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .dev-back-link:hover {
      background: rgba(0, 184, 212, 0.12);
    }

    .main-stage {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .ui-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      width: 80%;
      max-width: 500px;
      pointer-events: none;
    }

    .ui-container input {
      pointer-events: auto;
      width: 100%;
      padding: 15px 25px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 1.1rem;
      outline: none;
      backdrop-filter: blur(10px);
      transition: all 0.4s ease;
      text-align: center;
    }

    .ui-container input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .ui-container input:focus {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(0, 251, 255, 0.4);
      box-shadow: 0 0 24px rgba(0, 251, 255, 0.15);
    }
  </style>
</head>
<body>

  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Partículas 3D</span>
      <span class="dev-role">Coração de partículas vira texto ao digitar (até 15 letras). Mova o mouse para afastar as partículas.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <div class="main-stage">
    <div id="canvas-container"></div>
    <div class="ui-container">
      <input type="text" id="text-input" maxlength="15" autocomplete="off"
             placeholder="Digite um texto…" aria-label="Texto para as partículas formarem">
    </div>
  </div>

  <script>
    let scene, camera, renderer, particles;
    const particleCount = 40000;
    let targetPositions = [];
    let velocities = [];
    let mouse = new THREE.Vector2(-1000, -1000);
    let isTextMode = false;

    const textCanvas = document.createElement('canvas');
    const textCtx = textCanvas.getContext('2d');
    textCanvas.width = 800;
    textCanvas.height = 300;

    function getStage() {
      return document.getElementById('canvas-container');
    }

    /**
     * Gera um ponto na superfície de um coração 3D usando equação paramétrica.
     * @param {number} t - ângulo polar (0 a PI)
     * @param {number} u - ângulo azimutal (0 a 2*PI)
     */
    function getHeartPoint(t, u) {
      const x = 16 * Math.pow(Math.sin(u), 3) * Math.sin(t);
      const y = (13 * Math.cos(u) - 5 * Math.cos(2 * u) - 2 * Math.cos(3 * u) - Math.cos(4 * u)) * Math.sin(t);
      const z = 10 * Math.cos(t);
      return new THREE.Vector3(x * 0.75, y * 0.75, z * 0.75);
    }

    /**
     * Renderiza o texto em um canvas oculto e extrai os pixels visíveis como pontos 2D.
     * @param {string} text - texto a ser convertido em nuvem de pontos
     * @returns {Array|null} lista de pontos {x, y, z} ou null se texto vazio
     */
    function sampleText(text) {
      if (!text || text.trim() === '') return null;

      textCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
      textCtx.fillStyle = 'white';

      const fontSize = text.length > 10 ? 70 : 100;
      textCtx.font = `900 ${fontSize}px sans-serif`;
      textCtx.textAlign = 'center';
      textCtx.textBaseline = 'middle';
      textCtx.fillText(text, textCanvas.width / 2, textCanvas.height / 2);

      const imageData = textCtx.getImageData(0, 0, textCanvas.width, textCanvas.height).data;
      const points = [];

      for (let y = 0; y < textCanvas.height; y += 1) {
        for (let x = 0; x < textCanvas.width; x += 1) {
          const alpha = imageData[(y * textCanvas.width + x) * 4 + 3];
          if (alpha > 150) {
            points.push({
              x: (x - textCanvas.width / 2) * 0.1,
              y: -(y - textCanvas.height / 2) * 0.1,
              z: (Math.random() - 0.5) * 1.5
            });
          }
        }
      }
      return points;
    }

    function updateTargets(text) {
      const textPoints = sampleText(text);
      isTextMode = textPoints !== null && textPoints.length > 0;

      if (particles) {
        particles.rotation.y = 0;
        particles.rotation.x = 0;
        particles.rotation.z = 0;
      }

      for (let i = 0; i < particleCount; i++) {
        if (isTextMode) {
          const target = textPoints[i % textPoints.length];
          targetPositions[i] = {
            x: target.x + (Math.random() - 0.5) * 0.1,
            y: target.y + (Math.random() - 0.5) * 0.1,
            z: target.z + (Math.random() - 0.5) * 0.1
          };
        } else {
          const t = Math.acos(Math.random() * 2 - 1);
          const u = Math.random() * Math.PI * 2;
          const p = getHeartPoint(t, u);
          targetPositions[i] = {
            x: p.x + (Math.random() - 0.5) * 0.4,
            y: p.y + (Math.random() - 0.5) * 0.4,
            z: p.z + (Math.random() - 0.5) * 0.4
          };
        }
      }
    }

    function init() {
      const stage = getStage();
      const w = stage.clientWidth;
      const h = stage.clientHeight;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
      camera.position.z = 35;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(w, h);
      renderer.setPixelRatio(window.devicePixelRatio);
      stage.appendChild(renderer.domElement);

      const geometry = new THREE.BufferGeometry();
      const posArray = new Float32Array(particleCount * 3);
      const colorArray = new Float32Array(particleCount * 3);

      for (let i = 0; i < particleCount; i++) {
        posArray[i * 3] = (Math.random() - 0.5) * 200;
        posArray[i * 3 + 1] = (Math.random() - 0.5) * 200;
        posArray[i * 3 + 2] = (Math.random() - 0.5) * 200;

        velocities.push({ x: 0, y: 0, z: 0 });

        colorArray[i * 3] = 0.7 + Math.random() * 0.3;
        colorArray[i * 3 + 1] = 0.1 + Math.random() * 0.15;
        colorArray[i * 3 + 2] = 0.3 + Math.random() * 0.25;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

      const material = new THREE.PointsMaterial({
        size: 0.12,
        vertexColors: true,
        transparent: true,
        opacity: 0.85,
        blending: THREE.AdditiveBlending
      });

      particles = new THREE.Points(geometry, material);
      scene.add(particles);

      updateTargets('');

      window.addEventListener('resize', onWindowResize);
      getStage().addEventListener('mousemove', onMouseMove);
      document.getElementById('text-input').addEventListener('input', (e) => {
        updateTargets(e.target.value);
      });

      animate();
    }

    function onMouseMove(event) {
      const stage = getStage();
      const rect = stage.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function onWindowResize() {
      const stage = getStage();
      const w = stage.clientWidth;
      const h = stage.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }

    function animate() {
      requestAnimationFrame(animate);

      const posAttr = particles.geometry.attributes.position;

      const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
      vector.unproject(camera);
      const dir = vector.sub(camera.position).normalize();
      const distance = -camera.position.z / dir.z;
      const mPos = camera.position.clone().add(dir.multiplyScalar(distance));

      for (let i = 0; i < particleCount; i++) {
        const px = posAttr.getX(i);
        const py = posAttr.getY(i);
        const pz = posAttr.getZ(i);
        const target = targetPositions[i];

        const dx = px - mPos.x;
        const dy = py - mPos.y;
        const dz = pz - mPos.z;
        const distSq = dx * dx + dy * dy + dz * dz;
        const dist = Math.sqrt(distSq);

        if (dist < 8) {
          const force = (8 - dist) / 8;
          velocities[i].x += (dx / dist) * force * 1.8;
          velocities[i].y += (dy / dist) * force * 1.8;
          velocities[i].z += (dz / dist) * force * 1.8;
        }

        velocities[i].x += (target.x - px) * 0.08;
        velocities[i].y += (target.y - py) * 0.08;
        velocities[i].z += (target.z - pz) * 0.08;

        velocities[i].x *= 0.78;
        velocities[i].y *= 0.78;
        velocities[i].z *= 0.78;

        posAttr.setXYZ(i, px + velocities[i].x, py + velocities[i].y, pz + velocities[i].z);
      }

      posAttr.needsUpdate = true;
      particles.rotation.y = 0;
      particles.rotation.z = 0;
      particles.rotation.x = 0;

      renderer.render(scene, camera);
    }

    window.onload = init;
  </script>
</body>
</html>
