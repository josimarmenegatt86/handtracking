<!-- Caveira Fantasma Neon (base: smm.axtarget.xyz/test36.html) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caveira Fantasma Neon | Josimar Menegatt</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    * { box-sizing: border-box; }
    .dev-header {
      background: linear-gradient(90deg, #fff 0%, #e8f4fc 50%, #fff 100%);
      padding: 12px 24px; border-bottom: 2px solid #00b8d4;
      display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 500;
    }
    .dev-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; flex-shrink: 0; }
    .dev-avatar-fallback {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff); color: #fff;
      font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center;
      border: 2px solid #00d4ff; flex-shrink: 0;
    }
    .dev-identity { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dev-name { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role { color: #007a94; font-size: 11px; line-height: 1.35; }
    .dev-back-link {
      color: #0054a6; font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 6px 12px; border: 1px solid #00b8d4; border-radius: 6px; flex-shrink: 0;
    }
    .dev-back-link:hover { background: rgba(0, 184, 212, 0.12); }
    html, body { display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
    .main-stage { position: relative; flex: 1; min-height: 0; overflow: hidden; }

        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui-overlay {
            position: absolute; top: 20px; left: 20px;
            color: #00ffff; font-family: 'Courier New', Courier, monospace;
            pointer-events: none; z-index: 100;
            text-shadow: 0 0 15px #00ffff;
        }
        #skeleton-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
        }
    </style>
</head>
<body>
  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Caveira Fantasma Neon</span>
      <span class="dev-role">Caveira 2D: ao espalhar fica dourada; ao restaurar, azul neon.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <div class="main-stage">


    <div id="ui-overlay">
        <h1 class="text-2xl font-black tracking-tighter opacity-90 uppercase">Caveira Fantasma Neon</h1>
        <p class="text-[10px] opacity-70 mt-1 uppercase tracking-widest">Espalhar: dourado · Voltar: azul</p>
    </div>

    <canvas id="skeleton-canvas"></canvas>
    <video id="input-video" style="display:none"></video>

    <script>
        const videoElement = document.getElementById('input-video');
        const skelCanvas = document.getElementById('skeleton-canvas');
        const skelCtx = skelCanvas.getContext('2d');
        
        let scene, camera, renderer, particleSystem;
        const particleCount = 28000;
        let positions = [], targetPositions = [], velocities = [], colors = [];
        let interactionPos = new THREE.Vector3(2000, 2000, 2000); 

        const baseColor = new THREE.Color(0x00ffff);
        const scatterColor = new THREE.Color(0xffd700);

        function resize() {
            skelCanvas.width = window.innerWidth;
            skelCanvas.height = window.innerHeight;
            if (renderer) {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
        }
        window.addEventListener('resize', resize);

        function createSkullPoints() {
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                const rand = Math.random();

                if (rand > 0.35) {
                    const phi = Math.random() * Math.PI * 2;
                    const theta = Math.random() * Math.PI;
                    const r = 3 + Math.random() * 0.35;
                    x = r * Math.sin(theta) * Math.cos(phi);
                    y = r * Math.cos(theta) + 1.5;
                    z = r * Math.sin(theta) * Math.sin(phi);
                } else if (rand > 0.1) {
                    x = (Math.random() - 0.5) * 4;
                    y = Math.random() * -4.2 + 1;
                    z = (Math.random() - 0.5) * 3.5 + 0.5;
                } else {
                    x = (Math.random() - 0.5) * 12;
                    y = (Math.random() - 0.5) * 12;
                    z = (Math.random() - 0.5) * 12;
                }

                targetPositions.push(x, y, z);
                positions.push((Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50);
                velocities.push(0, 0, 0);
                colors.push(baseColor.r, baseColor.g, baseColor.b);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            document.querySelector('.main-stage').appendChild(renderer.domElement);
            resize();

            createSkullPoints();

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.04,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ 
            maxNumHands: 1, 
            modelComplexity: 1, 
            minDetectionConfidence: 0.85, 
            minTrackingConfidence: 0.85 
        });

        hands.onResults(results => {
            skelCtx.clearRect(0, 0, skelCanvas.width, skelCanvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                interactionPos.set((0.5 - indexTip.x) * 20, (0.5 - indexTip.y) * 15, 0);
            } else {
                interactionPos.set(2000, 2000, 2000);
            }
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);
            const posAttr = particleSystem.geometry.attributes.position;
            const colAttr = particleSystem.geometry.attributes.color;
            const time = Date.now() * 0.0007;

            const s = Math.sin(time);
            const c = Math.cos(time);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                let tx = targetPositions[i3];
                let ty = targetPositions[i3 + 1];
                let tz = targetPositions[i3 + 2];
                const rx = tx * c - tz * s;
                const rz = tx * s + tz * c;
                
                let px = posAttr.array[i3];
                let py = posAttr.array[i3 + 1];
                let pz = posAttr.array[i3 + 2];

                const dx = px - interactionPos.x;
                const dy = py - interactionPos.y;
                const dz = pz - interactionPos.z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                let isScattered = false;
                if (dist < 4.0) {
                    const force = (4.0 - dist) * 0.35; 
                    velocities[i3] += (dx / dist) * force;
                    velocities[i3 + 1] += (dy / dist) * force;
                    velocities[i3 + 2] += (dz / dist) * force;
                    isScattered = true;
                }

                velocities[i3] += (rx - px) * 0.02;
                velocities[i3 + 1] += (ty - py) * 0.02;
                velocities[i3 + 2] += (rz - pz) * 0.02;

                velocities[i3] *= 0.88;
                velocities[i3 + 1] *= 0.88;
                velocities[i3 + 2] *= 0.88;

                posAttr.array[i3] += velocities[i3];
                posAttr.array[i3 + 1] += velocities[i3 + 1];
                posAttr.array[i3 + 2] += velocities[i3 + 2];

                const distFromTarget = Math.sqrt(Math.pow(rx-px, 2) + Math.pow(ty-py, 2) + Math.pow(rz-pz, 2));
                
                let targetR, targetG, targetB;
                if (isScattered || distFromTarget > 1.5) {
                    targetR = scatterColor.r;
                    targetG = scatterColor.g;
                    targetB = scatterColor.b;
                } else {
                    targetR = baseColor.r;
                    targetG = baseColor.g;
                    targetB = baseColor.b;
                }

                colAttr.array[i3] += (targetR - colAttr.array[i3]) * 0.05;
                colAttr.array[i3+1] += (targetG - colAttr.array[i3+1]) * 0.05;
                colAttr.array[i3+2] += (targetB - colAttr.array[i3+2]) * 0.05;
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
  </div>
</body>
</html>
