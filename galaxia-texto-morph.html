<!-- Galáxia — Texto Morph Pro (base: smm.axtarget.xyz/test40.html) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galáxia 3D — Texto Morph Pro | Josimar Menegatt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
    * { box-sizing: border-box; }
    .dev-header {
      background: linear-gradient(90deg, #fff 0%, #e8f4fc 50%, #fff 100%);
      padding: 12px 24px; border-bottom: 2px solid #00b8d4;
      display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 500;
    }
    .dev-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; flex-shrink: 0; }
    .dev-avatar-fallback {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff); color: #fff;
      font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center;
      border: 2px solid #00d4ff; flex-shrink: 0;
    }
    .dev-identity { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dev-name { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role { color: #007a94; font-size: 11px; line-height: 1.35; }
    .dev-back-link {
      color: #0054a6; font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 6px 12px; border: 1px solid #00b8d4; border-radius: 6px; flex-shrink: 0;
    }
    .dev-back-link:hover { background: rgba(0, 184, 212, 0.12); }
    html, body { display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
    .main-stage { position: relative; flex: 1; min-height: 0; overflow: hidden; }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            /* Kursor normal formaya qaytarıldı */
            cursor: default;
            font-family: 'Segoe UI', sans-serif;
        }

        #ui-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        input {
            background: rgba(0, 242, 255, 0.05);
            border: 2px solid rgba(0, 242, 255, 0.3);
            padding: 15px 35px;
            border-radius: 50px;
            color: #00f2ff;
            font-size: 18px;
            outline: none;
            width: 300px;
            text-align: center;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            letter-spacing: 1px;
            /* Yazı sahəsi üzərində kursorun mətn formasına keçməsi üçün */
            cursor: text;
        }

        input:focus {
            border-color: #00f2ff;
            width: 420px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.1);
        }

        input::placeholder {
            color: rgba(0, 242, 255, 0.4);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        canvas { display: block; }
    </style>
</head>
<body>
  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Galáxia — Texto Morph Pro</span>
      <span class="dev-role">Texto e partículas em galáxia 3D com morph animado; digite e use o mouse.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <div class="main-stage">


    <div id="ui-container">
        <input type="text" id="textInput" placeholder="DIGITE UMA PALAVRA E PRESSIONE ENTER" autocomplete="off">
    </div>

    <script>
        let scene, camera, renderer, points, geometry;
        const particleCount = 150000;
        
        let positions, originalPositions, targetPositions, velocities;
        let isExploding = false;
        let isMorphing = false;
        
        let targetCameraPos = new THREE.Vector3(0, 500, 800);
        let mouse = new THREE.Vector2(-9999, -9999);
        let raycaster = new THREE.Raycaster();

        const textCanvas = document.createElement('canvas');
        const textCtx = textCanvas.getContext('2d', { WILL_READ_FREQUENTLY: true });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.copy(targetCameraPos);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.querySelector('.main-stage').appendChild(renderer.domElement);

            create3DGalaxy();

            window.addEventListener('mousedown', () => { if(!isMorphing) isExploding = true; });
            window.addEventListener('mouseup', () => isExploding = false);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('touchstart', onTouchMove, { passive: false });
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('resize', onResize);
            
            const input = document.getElementById('textInput');
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const text = e.target.value.trim();
                    if (text === "") {
                        isMorphing = false;
                        targetCameraPos.set(0, 500, 800);
                    } else {
                        morphToText(text);
                    }
                }
            });

            animate();
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onTouchMove(event) {
            if (event.touches.length > 0) {
                mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }

        function create3DGalaxy() {
            geometry = new THREE.BufferGeometry();
            positions = new Float32Array(particleCount * 3);
            originalPositions = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);
            velocities = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const arms = 5;
            const colorPalette = [
                new THREE.Color(0xff00cc), 
                new THREE.Color(0x00f2ff), 
                new THREE.Color(0xffaa00), 
                new THREE.Color(0xffffff)  
            ];

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const distance = Math.sqrt(Math.random()) * 850;
                const armAngle = (i % arms) * (Math.PI * 2 / arms);
                const twist = distance * 0.012; 
                const angle = armAngle + twist;
                
                const thickness = 100 * (1 - distance / 900);
                const x = Math.cos(angle) * distance + (Math.random()-0.5)*45;
                const z = Math.sin(angle) * distance + (Math.random()-0.5)*45;
                const y = (Math.random() - 0.5) * thickness;

                positions[i3] = x;
                positions[i3 + 1] = y;
                positions[i3 + 2] = z;

                originalPositions[i3] = x;
                originalPositions[i3 + 1] = y;
                originalPositions[i3 + 2] = z;

                const vSpeed = 15 + Math.random() * 15;
                velocities[i3] = (Math.random() - 0.5) * vSpeed;
                velocities[i3 + 1] = (Math.random() - 0.5) * vSpeed;
                velocities[i3 + 2] = (Math.random() - 0.5) * vSpeed;

                const color = colorPalette[i % 4];
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 1.8,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        function morphToText(text) {
            isMorphing = true;
            isExploding = false;
            
            const textLen = text.length;
            const fontSize = Math.max(110, 180 - (textLen * 4)); 
            
            let scaleFactor = 2.2;
            let camDistance = 1100;

            if (textLen > 8) {
                scaleFactor = 1.8;
                camDistance = 1100 + (textLen * 30);
            }
            if (textLen > 15) {
                scaleFactor = 1.4;
                camDistance = 1200 + (textLen * 40);
            }
            
            targetCameraPos.set(0, 0, camDistance);

            textCanvas.width = 2400; 
            textCanvas.height = 600;
            textCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            textCtx.fillStyle = 'white';
            textCtx.font = `bold ${fontSize}px Arial`;
            textCtx.textAlign = 'center';
            textCtx.textBaseline = 'middle';
            textCtx.fillText(text.toUpperCase(), 1200, 300);

            const imageData = textCtx.getImageData(0, 0, 2400, 600).data;
            const pixels = [];
            const step = textLen > 12 ? 3 : 2; 

            for (let y = 0; y < 600; y += step) {
                for (let x = 0; x < 2400; x += step) {
                    const alpha = imageData[(y * 2400 + x) * 4 + 3];
                    if (alpha > 128) {
                        pixels.push({
                            x: (x - 1200) * scaleFactor,
                            y: -(y - 300) * scaleFactor
                        });
                    }
                }
            }

            if (pixels.length === 0) return;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const pixel = pixels[i % pixels.length];
                
                targetPositions[i3] = pixel.x + (Math.random() - 0.5) * 4;
                targetPositions[i3 + 1] = pixel.y + (Math.random() - 0.5) * 4;
                targetPositions[i3 + 2] = (Math.random() - 0.5) * 15;
            }
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const posAttr = geometry.attributes.position.array;
            const lerpSpeed = isMorphing ? 0.05 : 0.07;
            
            // Mouse Interaction Logic
            raycaster.setFromCamera(mouse, camera);
            let mouseWorldPos = new THREE.Vector3();
            let distanceToZ0 = -camera.position.z / raycaster.ray.direction.z;
            mouseWorldPos.copy(camera.position).add(raycaster.ray.direction.multiplyScalar(distanceToZ0));

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                let tx, ty, tz;

                if (isMorphing) {
                    tx = targetPositions[i3];
                    ty = targetPositions[i3 + 1];
                    tz = targetPositions[i3 + 2];
                } else if (isExploding) {
                    posAttr[i3] += velocities[i3];
                    posAttr[i3 + 1] += velocities[i3 + 1];
                    posAttr[i3 + 2] += velocities[i3 + 2];
                    continue; 
                } else {
                    tx = originalPositions[i3];
                    ty = originalPositions[i3 + 1];
                    tz = originalPositions[i3 + 2];
                }

                const dx = posAttr[i3] - mouseWorldPos.x;
                const dy = posAttr[i3 + 1] - mouseWorldPos.y;
                const dz = posAttr[i3 + 2] - mouseWorldPos.z;
                const distSq = dx*dx + dy*dy + dz*dz;
                const repulsionRadius = isMorphing ? 15000 : 8000;

                if (distSq < repulsionRadius) {
                    const dist = Math.sqrt(distSq);
                    const force = (repulsionRadius - distSq) / repulsionRadius;
                    const repulsionX = (dx / dist) * force * 50;
                    const repulsionY = (dy / dist) * force * 50;
                    
                    posAttr[i3] += repulsionX;
                    posAttr[i3 + 1] += repulsionY;
                }

                posAttr[i3] += (tx - posAttr[i3]) * lerpSpeed;
                posAttr[i3 + 1] += (ty - posAttr[i3 + 1]) * lerpSpeed;
                posAttr[i3 + 2] += (tz - posAttr[i3 + 2]) * lerpSpeed;
            }

            geometry.attributes.position.needsUpdate = true;
            camera.position.lerp(targetCameraPos, 0.05);
            camera.lookAt(0, 0, 0);

            if (!isMorphing) {
                points.rotation.y += 0.002;
            } else {
                points.rotation.y *= 0.9; 
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
  </div>
</body>
</html>
