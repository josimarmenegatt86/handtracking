<!-- Fumaça Azul — Uma Mão (base: smm.axtarget.xyz/test26.html) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fumaça Azul Realista — Uma Mão | Josimar Menegatt</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
    * { box-sizing: border-box; }
    .dev-header {
      background: linear-gradient(90deg, #fff 0%, #e8f4fc 50%, #fff 100%);
      padding: 12px 24px; border-bottom: 2px solid #00b8d4;
      display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 500;
    }
    .dev-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; flex-shrink: 0; }
    .dev-avatar-fallback {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff); color: #fff;
      font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center;
      border: 2px solid #00d4ff; flex-shrink: 0;
    }
    .dev-identity { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dev-name { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role { color: #007a94; font-size: 11px; line-height: 1.35; }
    .dev-back-link {
      color: #0054a6; font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 6px 12px; border: 1px solid #00b8d4; border-radius: 6px; flex-shrink: 0;
    }
    .dev-back-link:hover { background: rgba(0, 184, 212, 0.12); }
    html, body { display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
    .main-stage { position: relative; flex: 1; min-height: 0; overflow: hidden; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #videoElement, #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Daha realistik duman üçün qatmanlı filtrasiya */
        #outputCanvas {
            filter: blur(4px) contrast(1.5) brightness(1.2) saturate(1.4);
            mix-blend-mode: screen;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00aaff;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #00aaff;
        }
    </style>
</head>
<body>
  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Fumaça Azul — Uma Mão</span>
      <span class="dev-role">Rastro de fumaça azul realista gerado por uma mão na câmera.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <div class="main-stage">


    <div id="loading">Preparando câmera e inteligência artificial...</div>

    <div class="container">
        <video id="videoElement" playsinline></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('outputCanvas');
        const ctx = canvasElement.getContext('2d');
        const loadingDiv = document.getElementById('loading');

        let smokeParticles = [];

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function isPointingIndex(landmarks) {
            // Şəhadət barmağı açıq, digərləri bağlı
            const isIndexOpen = landmarks[8].y < landmarks[6].y;
            const isMiddleClosed = landmarks[12].y > landmarks[10].y;
            const isRingClosed = landmarks[16].y > landmarks[14].y;
            const isPinkyClosed = landmarks[20].y > landmarks[18].y;
            return isIndexOpen && isMiddleClosed && isRingClosed && isPinkyClosed;
        }

        class SmokeParticle {
            constructor(x, y) {
                this.x = x + (Math.random() - 0.5) * 10;
                this.y = y;
                this.size = Math.random() * 20 + 15;
                this.maxSize = Math.random() * 80 + 100; // Tüstü yuxarı qalxdıqca genişlənir
                
                this.vx = (Math.random() - 0.5) * 1.5; // Üfüqi yayılma
                this.vy = (Math.random() * -3) - 2;   // Daha sürətli yuxarı qalxma
                
                this.alpha = 0.6; 
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.fadeSpeed = Math.random() * 0.005 + 0.004;
                this.turbulence = Math.random() * 0.05; // Tüstünün titrəməsi üçün
            }

            update() {
                this.x += this.vx + Math.sin(this.y * 0.05) * 0.5; // Sinusoidal hərəkət
                this.y += this.vy;
                
                this.size += 0.8; // Genişlənmə sürəti artırıldı
                this.alpha -= this.fadeSpeed;
                this.rotation += this.rotationSpeed;
                
                // Hava müqaviməti simulyasiyası
                this.vy *= 0.98;
                this.vx *= 0.99;
            }

            draw() {
                if (this.alpha <= 0) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;
                
                // Mərkəzi parlaq, kənarları dumanlı gradient
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                grad.addColorStop(0, 'rgba(0, 180, 255, 0.6)');  // İntensiv mavi mərkəz
                grad.addColorStop(0.3, 'rgba(0, 100, 200, 0.3)'); // Keçid
                grad.addColorStop(0.7, 'rgba(50, 50, 150, 0.1)'); // Dumanlı kənar
                grad.addColorStop(1, 'transparent');

                ctx.fillStyle = grad;
                
                // Tüstü forması üçün bir az qeyri-müntəzəm dairə (scale ilə)
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        function onResults(results) {
            if (loadingDiv) loadingDiv.style.display = 'none';
            
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Tüstülərin bir-birinin üstünə minərək parlaqlıq yaratması üçün
            ctx.globalCompositeOperation = 'screen'; 

            // Yalnız 1-ci əli götürürük (hətta kamerada 2 əl olsa belə)
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0]; 
                
                if (isPointingIndex(landmarks)) {
                    const tip = landmarks[8];
                    // Normalizə olunmuş koordinatları pikselə çeviririk
                    const x = tip.x * canvasElement.width;
                    const y = tip.y * canvasElement.height;
                    
                    // Daha qatı tüstü üçün hər frame-də 5 hissəcik
                    for(let i=0; i<5; i++) {
                        smokeParticles.push(new SmokeParticle(x, y));
                    }
                }
            }

            // Hissəcikləri emal et
            for (let i = 0; i < smokeParticles.length; i++) {
                smokeParticles[i].update();
                smokeParticles[i].draw();
                if (smokeParticles[i].alpha <= 0 || smokeParticles[i].size > 300) {
                    smokeParticles.splice(i, 1);
                    i--;
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1, // MediaPipe-a yalnız 1 əl axtarmağı tapşırırıq
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });

        camera.start().catch(err => {
            loadingDiv.innerText = "Acesso à câmera negado ou ocorreu um erro.";
            console.error(err);
        });
    </script>
  </div>
</body>
</html>
