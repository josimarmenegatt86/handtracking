<!DOCTYPE html>
<!-- Desenho com faíscas de fogo realistas (base: smm.axtarget.xyz/test30.html) -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faíscas de Fogo | Josimar Menegatt</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; overflow: hidden; background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; height: 100vh;
    }
    .dev-header {
      background: linear-gradient(90deg, #fff 0%, #e8f4fc 50%, #fff 100%);
      padding: 12px 24px; border-bottom: 2px solid #00b8d4;
      display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 300;
    }
    .dev-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; flex-shrink: 0; }
    .dev-avatar-fallback {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #0054a6, #00d4ff); color: #fff;
      font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center;
      border: 2px solid #00d4ff; flex-shrink: 0;
    }
    .dev-identity { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dev-name { color: #0d2137; font-size: 16px; font-weight: 700; }
    .dev-role { color: #007a94; font-size: 11px; line-height: 1.35; }
    .dev-back-link {
      color: #0054a6; font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 6px 12px; border: 1px solid #00b8d4; border-radius: 6px; flex-shrink: 0;
    }
    .dev-back-link:hover { background: rgba(0, 184, 212, 0.12); }
    .main-stage { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    #canvas-wrap { position: absolute; inset: 0; }
    #canvas-wrap canvas {
      position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1);
    }
    #video-hidden { display: none; }
    #loader {
      position: absolute; inset: 0; background: #000; display: flex;
      align-items: center; justify-content: center; z-index: 200;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255, 60, 0, 0.3);
      border-top-color: #ff3c00; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="dev-header">
    <img class="dev-avatar" src="assets/avatar.jpg" alt="Foto de Josimar Menegatt"
         onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';">
    <div id="avatar-fallback" class="dev-avatar-fallback" style="display:none;" aria-hidden="true">JM</div>
    <div class="dev-identity">
      <span class="dev-name">Faíscas de Fogo</span>
      <span class="dev-role">Indicador levantado + outros dedos fechados: desenha com faíscas. Polegar para cima + indicador fechado: limpa a tela.</span>
    </div>
    <a class="dev-back-link" href="index.html">← Início</a>
  </header>

  <div class="main-stage" id="main-stage">
    <div id="loader"><div class="spinner"></div></div>
    <div id="canvas-wrap">
      <video id="video-hidden" playsinline></video>
      <canvas id="ui-canvas"></canvas>
      <canvas id="main-canvas"></canvas>
    </div>
  </div>

  <script>
    const stageEl = document.getElementById('main-stage');
    const videoElement = document.getElementById('video-hidden');
    const uiCanvas = document.getElementById('ui-canvas');
    const mainCanvas = document.getElementById('main-canvas');
    const uiCtx = uiCanvas.getContext('2d');
    const mainCtx = mainCanvas.getContext('2d');
    const loader = document.getElementById('loader');

    let particles = [];
    let completedStrokes = [];
    let currentStroke = [];
    let isDrawingLastFrame = false;

    class SparkParticle {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.z = Math.random() * 20;
        const angle = Math.random() * Math.PI * 2;
        const force = Math.random() * 7 + 2;
        this.vx = Math.cos(angle) * force;
        this.vy = Math.sin(angle) * force - 2;
        this.vz = (Math.random() - 0.5) * 5;
        this.friction = 0.97;
        this.gravity = 0.25;
        this.life = 1.0;
        this.decay = 0.01 + Math.random() * 0.015;
        this.hue = 15 + Math.random() * 25;
      }
      update() {
        this.x += this.vx; this.y += this.vy; this.z += this.vz;
        this.vy += this.gravity;
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.life -= this.decay;
      }
      draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.life;
        const brightness = this.life > 0.5 ? 90 : 50;
        const color = `hsl(${this.hue}, 100%, ${brightness}%)`;
        ctx.strokeStyle = color;
        ctx.lineWidth = this.life * 3;
        ctx.lineCap = 'round';
        ctx.shadowBlur = this.life * 12;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - this.vx * 0.8, this.y - this.vy * 0.8);
        ctx.stroke();
        ctx.restore();
      }
    }

    function resizeCanvases() {
      const w = stageEl.clientWidth;
      const h = stageEl.clientHeight;
      uiCanvas.width = mainCanvas.width = w;
      uiCanvas.height = mainCanvas.height = h;
    }

    /**
     * Detecta gestos da mão:
     * - isDrawing: indicador levantado + médio fechado
     * - isClearing: polegar para cima + indicador fechado
     */
    function checkGestures(landmarks) {
      const isDrawing = landmarks[8].y < landmarks[6].y && landmarks[12].y > landmarks[10].y;
      const isClearing = landmarks[4].y < landmarks[3].y && landmarks[8].y > landmarks[6].y;
      return { isDrawing, isClearing };
    }

    function processStrokes() {
      for (let s = completedStrokes.length - 1; s >= 0; s--) {
        const strokeObj = completedStrokes[s];
        const n = Math.min(strokeObj.points.length, 2);
        for (let i = 0; i < n; i++) {
          const p = strokeObj.points.shift();
          for (let j = 0; j < 5; j++) particles.push(new SparkParticle(p.x, p.y));
        }
        if (strokeObj.points.length === 0) completedStrokes.splice(s, 1);
      }
    }

    function drawStroke(ctx, points, color, glowColor) {
      if (points.length < 2) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.shadowBlur = 15;
      ctx.shadowColor = glowColor || color;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.stroke();
      ctx.restore();
    }

    function drawHand(landmarks, isDrawing) {
      const baseColor = isDrawing ? 'rgba(255, 100, 0, 1)' : 'rgba(255, 255, 255, 0.8)';
      const glowColor = isDrawing ? 'rgba(255, 50, 0, 0.8)' : 'rgba(200, 200, 255, 0.4)';
      uiCtx.save();
      uiCtx.shadowBlur = 15;
      uiCtx.shadowColor = glowColor;
      drawConnectors(uiCtx, landmarks, HAND_CONNECTIONS, { color: baseColor, lineWidth: 2.5 });
      for (const landmark of landmarks) {
        uiCtx.beginPath();
        uiCtx.arc(landmark.x * uiCanvas.width, landmark.y * uiCanvas.height, 4, 0, 2 * Math.PI);
        uiCtx.fillStyle = baseColor;
        uiCtx.fill();
        uiCtx.beginPath();
        uiCtx.arc(landmark.x * uiCanvas.width, landmark.y * uiCanvas.height, 1.5, 0, 2 * Math.PI);
        uiCtx.fillStyle = '#fff';
        uiCtx.fill();
      }
      uiCtx.restore();
    }

    function onResults(results) {
      loader.style.display = 'none';
      resizeCanvases();
      uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
      mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const gestures = checkGestures(landmarks);
        const indexTip = {
          x: landmarks[8].x * mainCanvas.width,
          y: landmarks[8].y * mainCanvas.height
        };

        if (gestures.isDrawing) {
          currentStroke.push(indexTip);
          drawStroke(mainCtx, currentStroke, '#fff6e0', '#ffaa00');
          isDrawingLastFrame = true;
          if (Math.random() > 0.3) particles.push(new SparkParticle(indexTip.x, indexTip.y));
        } else {
          if (isDrawingLastFrame && currentStroke.length > 0) {
            completedStrokes.push({ points: [...currentStroke] });
            currentStroke = [];
          }
          isDrawingLastFrame = false;
        }

        if (gestures.isClearing) {
          particles = [];
          completedStrokes = [];
          currentStroke = [];
        }
        drawHand(landmarks, gestures.isDrawing);
      } else {
        if (isDrawingLastFrame && currentStroke.length > 0) {
          completedStrokes.push({ points: [...currentStroke] });
          currentStroke = [];
        }
        isDrawingLastFrame = false;
      }

      processStrokes();
      completedStrokes.forEach((s) => drawStroke(mainCtx, s.points, 'rgba(255, 60, 0, 0.4)', 'rgba(100, 20, 0, 0.3)'));
      particles = particles.filter((p) => p.life > 0);
      particles.forEach((p) => { p.update(); p.draw(mainCtx); });
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 1, modelComplexity: 1,
      minDetectionConfidence: 0.7, minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    const cam = new Camera(videoElement, {
      onFrame: async () => { await hands.send({ image: videoElement }); },
      width: 1280, height: 720
    });

    resizeCanvases();
    window.addEventListener('resize', resizeCanvases);
    cam.start();
  </script>
</body>
</html>
